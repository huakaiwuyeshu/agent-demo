# Netlify 配置文件
# 文档：https://docs.netlify.com/configure-builds/file-based-configuration/

[build]
  # 不需要构建步骤，直接发布 web 目录
  publish = "web"
  command = ""

# 重定向规则：所有路径都指向 index.html（SPA 路由）
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# HTTP 头配置
[[headers]]
  for = "/*"
  [headers.values]
    # 启用 CORS（如果需要从其他域访问）
    Access-Control-Allow-Origin = "*"
    # 缓存控制
    Cache-Control = "public, max-age=3600"

[[headers]]
  for = "/knowledge.js"
  [headers.values]
    # 知识库文件缓存 1 天
    Cache-Control = "public, max-age=86400"

[[headers]]
  for = "/*.html"
  [headers.values]
    # HTML 文件不缓存，确保更新及时
    Cache-Control = "no-cache"
